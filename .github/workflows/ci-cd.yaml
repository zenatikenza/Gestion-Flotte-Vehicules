name: CI-CD Fleet Management

# Le pipeline se déclenche à chaque fois que tu "push" sur main
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le code de ton dépôt
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Installer Java 21 pour compiler tes microservices
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # 3. Compiler le projet avec Maven (on saute les tests pour aller vite)
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 4. Se connecter à ton Docker Hub (utilise tes secrets GitHub)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 5. Construire et envoyer l'image Docker du service principal
      - name: Build and Push Vehicle Service
        uses: docker/build-push-action@v5
        with:
          context: ./vehicle-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/vehicle-service:latest