apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "fleet-management.labels" . | nindent 4 }}
data:
  VEHICLE_SERVICE_URL: "http://vehicle-service:{{ .Values.vehicleService.port }}"
  CONDUCTOR_SERVICE_URL: "http://conductor-service:{{ .Values.conductorService.port }}"
  MAINTENANCE_SERVICE_URL: "http://maintenance-service:{{ .Values.maintenanceService.port }}"
  LOCALIZATION_SERVICE_URL: "http://localization-service:{{ .Values.localizationService.port }}"
  KAFKA_BROKERS: "{{ .Values.kafka.brokers }}"
  NODE_ENV: "production"
  KEYCLOAK_URL: "{{ .Values.keycloak.url }}"
  KEYCLOAK_REALM: "{{ .Values.keycloak.realm }}"
