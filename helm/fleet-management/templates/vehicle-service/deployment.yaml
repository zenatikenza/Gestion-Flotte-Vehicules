apiVersion: apps/v1
kind: Deployment
metadata:
  name: vehicle-service
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "fleet-management.labels" . | nindent 4 }}
    app: vehicle-service
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: vehicle-service
  template:
    metadata:
      labels:
        app: vehicle-service
    spec:
      containers:
        - name: vehicle-service
          image: "{{ .Values.vehicleService.image }}:{{ .Values.vehicleService.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.vehicleService.port }}
          envFrom:
            - configMapRef:
                name: vehicle-service-config
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.vehicleService.port }}
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: {{ .Values.vehicleService.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
