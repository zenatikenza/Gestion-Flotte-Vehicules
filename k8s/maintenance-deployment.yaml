apiVersion: apps/v1
kind: Deployment
metadata:
  name: maintenance-deployment
  namespace: fleet-management
  labels:
    app: maintenance
spec:
  replicas: 1
  selector:
    matchLabels:
      app: maintenance
  template:
    metadata:
      labels:
        app: maintenance
    spec:
      containers:
      - name: maintenance-container
        image: maintenance-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8083
        env:
        - name: DB_HOST
          value: "fleet-db-postgresql"
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: "maintenance_db"
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: maintenance-db-secret
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: maintenance-db-secret
              key: password
        - name: KAFKA_BROKERS
          value: "fleet-kafka-kafka-bootstrap:9092"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otel-collector:4318/v1/traces"
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /api/interventions
            port: 8083
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /api/interventions
            port: 8083
          initialDelaySeconds: 30
          periodSeconds: 20
          failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: maintenance-service
  namespace: fleet-management
  labels:
    app: maintenance
spec:
  selector:
    app: maintenance
  ports:
    - protocol: TCP
      port: 8083
      targetPort: 8083
      nodePort: 30083
  type: NodePort
---
apiVersion: v1
kind: Secret
metadata:
  name: maintenance-db-secret
  namespace: fleet-management
type: Opaque
stringData:
  username: maintenance_user
  password: maintenance_pass
