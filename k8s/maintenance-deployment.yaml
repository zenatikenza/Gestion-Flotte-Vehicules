apiVersion: apps/v1
kind: Deployment
metadata:
  name: maintenance-deployment
  namespace: fleet-management
spec:
  replicas: 1
  selector:
    matchLabels:
      app: maintenance
  template:
    metadata:
      labels:
        app: maintenance
    spec:
      containers:
      - name: maintenance-container
        image: nginx:alpine
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: maintenance-service
  namespace: fleet-management
spec:
  selector:
    app: maintenance
  ports:
    - protocol: TCP
      port: 8083
      targetPort: 80
  type: NodePort