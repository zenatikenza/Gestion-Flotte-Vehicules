apiVersion: apps/v1
kind: Deployment
metadata:
  name: conductor-deployment
  namespace: fleet-management
spec:
  replicas: 1
  selector:
    matchLabels:
      app: conductor
  template:
    metadata:
      labels:
        app: conductor
    spec:
      containers:
      - name: conductor-container
        image: nginx:alpine
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: conductor-service
  namespace: fleet-management
spec:
  selector:
    app: conductor
  ports:
    - protocol: TCP
      port: 8082
      targetPort: 80
  type: NodePort