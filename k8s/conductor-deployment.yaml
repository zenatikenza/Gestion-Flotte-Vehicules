apiVersion: apps/v1
kind: Deployment
metadata:
  name: conductor-deployment
  namespace: fleet-management
  labels:
    app: conductor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: conductor
  template:
    metadata:
      labels:
        app: conductor
    spec:
      containers:
      - name: conductor-container
        image: conductor-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8082
        env:
        - name: DB_HOST
          value: "fleet-db-postgresql"
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: "conductor_db"
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: conductor-db-secret
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: conductor-db-secret
              key: password
        - name: KAFKA_BROKERS
          value: "fleet-kafka-kafka-bootstrap:9092"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otel-collector:4318/v1/traces"
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /api/conducteurs
            port: 8082
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /api/conducteurs
            port: 8082
          initialDelaySeconds: 30
          periodSeconds: 20
          failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: conductor-service
  namespace: fleet-management
  labels:
    app: conductor
spec:
  selector:
    app: conductor
  ports:
    - protocol: TCP
      port: 8082
      targetPort: 8082
      nodePort: 30082
  type: NodePort
---
apiVersion: v1
kind: Secret
metadata:
  name: conductor-db-secret
  namespace: fleet-management
type: Opaque
stringData:
  username: conductor_user
  password: conductor_pass
