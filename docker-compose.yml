services:
  postgres:
    image: postgres:15
    environment:
      - POSTGRES_PASSWORD=admin_password
      - POSTGRES_MULTIPLE_DATABASES=conductor_db,maintenance_db,localization_db,keycloak_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    ports:
      - "5432:5432"

  zookeeper:
    image: quay.io/strimzi/kafka:latest-kafka-3.7.0
    command: [
      "sh", "-c",
      "bin/zookeeper-server-start.sh config/zookeeper.properties"
    ]
    environment:
      LOG_DIR: /tmp/logs

  kafka:
    image: quay.io/strimzi/kafka:latest-kafka-3.7.0
    command: [
      "sh", "-c",
      "bin/kafka-server-start.sh config/server.properties --override listeners=PLAINTEXT://0.0.0.0:9092 --override advertised.listeners=PLAINTEXT://kafka:9092 --override zookeeper.connect=zookeeper:2181"
    ]
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      LOG_DIR: /tmp/logs

  jaeger:
    image: jaegertracing/all-in-one:latest
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686" # UI Jaeger
      - "4318:4318"  # OTLP HTTP

  vehicle-service:
    build: ./vehicle-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/postgres
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=admin_password
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - MANAGEMENT_OTLP_TRACING_ENDPOINT=http://jaeger:4318/v1/traces
      - KEYCLOAK_URL=http://keycloak:8080
      - KEYCLOAK_REALM=FleetManagement
    depends_on:
      - postgres
      - kafka
      - keycloak

  conductor-service:
    build: ./conductor-service
    ports:
      - "8082:8082"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=conductor_db
      - DB_USER=postgres
      - DB_PASSWORD=admin_password
      - KAFKA_BROKERS=kafka:9092
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318/v1/traces
      - KEYCLOAK_URL=http://keycloak:8080
      - KEYCLOAK_REALM=FleetManagement
    depends_on:
      - postgres
      - kafka
      - keycloak

  maintenance-service:
    build: ./maintenance-service
    ports:
      - "8083:8083"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=maintenance_db
      - DB_USER=postgres
      - DB_PASSWORD=admin_password
      - KAFKA_BROKERS=kafka:9092
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318/v1/traces
      - KEYCLOAK_URL=http://keycloak:8080
      - KEYCLOAK_REALM=FleetManagement
    depends_on:
      - postgres
      - kafka
      - keycloak

  api-gateway:
    build: ./api-gateway
    ports:
      - "3000:3000"
    environment:
      - VEHICLE_SERVICE_URL=http://vehicle-service:8081
      - CONDUCTOR_SERVICE_URL=http://conductor-service:8082
      - MAINTENANCE_SERVICE_URL=http://maintenance-service:8083
      - LOCALIZATION_SERVICE_URL=http://localization-service:8084
      - KAFKA_BROKERS=kafka:9092
      - NODE_ENV=development
      - KEYCLOAK_URL=http://keycloak:8080
      - KEYCLOAK_REALM=FleetManagement
      - KC_ADMIN_USERNAME=admin
      - KC_ADMIN_PASSWORD=admin
    depends_on:
      - vehicle-service
      - conductor-service
      - maintenance-service
      - localization-service
      - kafka
      - keycloak

  localization-service:
    build: ./localization-service
    ports:
      - "8084:8084"
      - "50051:50051"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=localization_db
      - DB_USER=postgres
      - DB_PASSWORD=admin_password
      - KAFKA_BROKERS=kafka:9092
      - PORT=8084
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318/v1/traces
    depends_on:
      - postgres
      - kafka

  event-service:
    image: nginx:alpine
    ports: ["8085:80"]

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
    depends_on:
      - vehicle-service
      - conductor-service
      - maintenance-service
      - localization-service
      - api-gateway

  alertmanager:
    image: prom/alertmanager:latest
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./promtail/config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.7
    command: ["start-dev", "--import-realm"]
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://postgres:5432/keycloak_db
      - KC_DB_USERNAME=postgres
      - KC_DB_PASSWORD=admin_password
      - KC_HOSTNAME_STRICT=false
      - KC_HTTP_ENABLED=true
    volumes:
      - ./Configuration/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  fleet-frontend:
    build: ./fleet-frontend
    ports:
      - "5173:80"
    depends_on:
      - api-gateway
      - keycloak

volumes:
  postgres_data:
  grafana_data: