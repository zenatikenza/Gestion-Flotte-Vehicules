type Position {
  vehiculeId: ID!
  latitude: Float!
  longitude: Float!
  vitesse: Float
  horodatage: String!
  enZoneAutorisee: Boolean!
}

type FleetVehicle {
  id: ID!
  immatriculation: String!
  marque: String!
  modele: String!
  statut: String!
  kilometrage: Float!
  conducteurAssigne: Conducteur
  interventions: [Intervention!]!
  positionActuelle: Position
}

type Conducteur {
  id: ID!
  nom: String!
  prenom: String!
  numeroPermis: String!
  categoriePermis: String!
  actif: Boolean!
}

type Intervention {
  id: ID!
  vehiculeImmat: String!
  technicienId: String
  type: String!
  statut: String!
  datePlanifiee: String!
  dateRealisation: String
  cout: Float
  description: String
}

type KeycloakUser {
  id: ID!
  username: String!
  email: String
  firstName: String
  lastName: String
  enabled: Boolean!
  realmRoles: [String!] 
}

type FleetStats {
  totalVehicules: Int!
  disponibles: Int!
  enService: Int!
  enMaintenance: Int!
  horsService: Int!
  totalConducteurs: Int!
  assignationsActives: Int!
  interventionsActives: Int!
}

type AdminStats {
  totalUtilisateurs: Int!
  admins: Int!
  managers: Int!
  techniciens: Int!
  utilisateurs: Int!
  actifs: Int!
  inactifs: Int!
}

type Query {
  fleetVehicles: [FleetVehicle!]!
  fleetVehicle(id: ID!): FleetVehicle
  conducteurs: [Conducteur!]!
  interventions(vehiculeImmat: String): [Intervention!]!
  positionActuelle(vehiculeId: ID!): Position
  historiquePositions(vehiculeId: ID!, debut: String!, fin: String!): [Position!]!
  adminUsers: [KeycloakUser!]!
  adminStats: AdminStats!
  fleetStats: FleetStats!
}

type Mutation {
  assignerConducteur(conducteurId: ID!, vehiculeId: ID!): Conducteur!
  
  createUser(
    username: String!,
    email: String!,
    firstName: String,
    lastName: String,
    password: String!,
    roles: [String!]!,
    numeroPermis: String,
    categoriePermis: String,
    dateValiditePermis: String
  ): KeycloakUser!

  toggleUser(userId: ID!, enabled: Boolean!): KeycloakUser!
  resetPassword(userId: ID!, newPassword: String!): Boolean!
}

type Subscription {
  positionEnTempsReel(vehiculeId: ID!): Position!
}